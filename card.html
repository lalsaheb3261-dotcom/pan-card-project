<!DOCTYPE html>
<html>
<head>
<title>PAN Card</title>

<style>

body{
background:#f2f2f2;
font-family:Arial;
}

.card{

width:800px;
height:450px;

margin:40px auto;

background:url("https://scontent.fpat2-7.fna.fbcdn.net/v/t39.30808-6/571253499_1279107790921952_3651165948366118059_n.jpg?_nc_cat=105&ccb=1-7&_nc_sid=13d280&_nc_ohc=6TNBqkMia20Q7kNvwHjTTOO&_nc_oc=AdlVJRkwbTdsfZk1PBGGZgSDxBi21FYsJyz_jq13CbtE8g4M6X_CCh-CA7BsrmVnt73MOj3-922pdzZR2qaYV05l&_nc_zt=23&_nc_ht=scontent.fpat2-7.fna&_nc_gid=FrH5tSG-e5qpQ-M0zlBbSA&_nc_ss=8&oh=00_Afy_gnSYewxMOL1_L1QzB2hn-QNKx4IXMFF7_EHaxt7f2g&oe=69B59991");
background-size:100% 100%;
background-repeat:no-repeat;

position:relative;

}

/* Photo */

.photo{

width:140px;
height:160px;

position:absolute;

top:120px;
left:40px;

object-fit:cover;

}

/* PAN Number */

.pan{

position:absolute;

top:170px;
left:330px;

font-size:26px;
font-weight:bold;

letter-spacing:3px;

}

/* Name */

.name{

position:absolute;

top:240px;
left:170px;

font-size:18px;

}

/* Father Name */

.father{

position:absolute;

top:290px;
left:170px;

font-size:18px;

}

/* DOB */

.dob{

position:absolute;

top:340px;
left:170px;

font-size:18px;

}

/* Signature */

.sign{

position:absolute;

bottom:50px;
left:420px;

font-size:24px;
font-family:cursive;

}

</style>
</head>

<body>

<div class="card">

<img src="photo.jpg" class="photo">

<div class="pan">ABCDE1234F</div>

<div class="name">APPLICANT NAME</div>

<div class="father">APPLICANT'S FATHER NAME</div>

<div class="dob">01/06/1995</div>

<div class="sign">Signature</div>

</div>

</body>
</html>
