<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PAN Card Template</title>

<style>

body{
background:#f2f2f2;
font-family:Arial;
}

/* Card */

.card{

width:800px;
height:450px;

margin:40px auto;

background:url("pan_bg.jpg");
background-size:100% 100%;
background-repeat:no-repeat;

position:relative;

}

/* Photo */

.photo{

width:140px;
height:160px;

position:absolute;

top:120px;
left:40px;

object-fit:cover;

border:2px solid #333;

}

/* PAN Number */

.pan{

position:absolute;

top:170px;
left:330px;

font-size:26px;

font-weight:bold;

letter-spacing:3px;

}

/* Name */

.name{

position:absolute;

top:240px;
left:170px;

font-size:18px;

font-weight:bold;

}

/* Father Name */

.father{

position:absolute;

top:290px;
left:170px;

font-size:18px;

}

/* DOB */

.dob{

position:absolute;

top:340px;
left:170px;

font-size:18px;

}

/* Signature */

.sign{

position:absolute;

bottom:50px;
left:420px;

font-size:24px;

font-family:cursive;

}

</style>
</head>

<body>

<div class="card">

<img src="photo.jpg" class="photo">

<div class="pan">ABCDE1234F</div>

<div class="name">APPLICANT NAME</div>

<div class="father">FATHER NAME</div>

<div class="dob">01/01/1995</div>

<div class="sign">Signature</div>

</div>

</body>
</html>
